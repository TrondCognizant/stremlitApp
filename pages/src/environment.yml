name: azure_ml_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - pip:
    - numpy<2.0.0
    - pandas
    - tensorflow==2.13.0  # Last version to officially support Python 3.8
    - mlflow<=2.10.0      # Newer MLflow versions prefer Python 3.9+
    - mlflow-skinny
    - azureml-mlflow
    - azure-ai-ml==1.22.4
    - azure-identity